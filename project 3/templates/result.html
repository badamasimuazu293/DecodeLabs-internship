<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recommendation Results</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#4f46e5,#7c3aed);
    padding:20px;
}

.container{
    width:100%;
    max-width:800px;
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 15px 35px rgba(0,0,0,0.15);
}

h1{
    text-align:center;
    color:#1f2937;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#6b7280;
    margin-bottom:30px;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-bottom:30px;
}

table th{
    background:#4f46e5;
    color:white;
    padding:15px;
    text-align:left;
}

table td{
    padding:15px;
    border-bottom:1px solid #e5e7eb;
}

table tr:hover{
    background:#f8fafc;
}

.score{
    font-weight:600;
    color:#16a34a;
}

.rank{
    width:50px;
    text-align:center;
    font-weight:bold;
}

.btn{
    display:block;
    width:220px;
    margin:0 auto;
    text-align:center;
    text-decoration:none;
    background:#4f46e5;
    color:white;
    padding:14px;
    border-radius:12px;
    font-weight:600;
    transition:.3s;
}

.btn:hover{
    background:#4338ca;
    transform:translateY(-2px);
}

.icon{
    text-align:center;
    font-size:60px;
    margin-bottom:10px;
}

</style>

</head>
<body>

<div class="container">

    <div class="icon">🎯</div>

    <h1>Top Career Recommendations</h1>

    <p class="subtitle">
        Based on your skills and interests, these are your best matches.
    </p>

    <table>

        <thead>
            <tr>
                <th>#</th>
                <th>Career Role</th>
                <th>Match Score</th>
            </tr>
        </thead>

        <tbody>

        {% for item in results %}

        <tr>
            <td class="rank">{{ loop.index }}</td>

            <td>
                {{ item.Role }}
            </td>

            <td class="score">
                {{ (item.Score * 100)|round(2) }}%
            </td>
        </tr>

        {% endfor %}

        </tbody>

    </table>

    <a href="/" class="btn">
        🔄 Try Again
    </a>

</div>

</body>
</html>
